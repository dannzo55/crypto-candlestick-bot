<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Candlestick Signal Bot</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 6px;
        }

        header p {
            opacity: 0.85;
            font-size: 1em;
        }

        /* ── Controls bar ── */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input,
        .controls select {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            background: white;
            color: #333;
            min-width: 140px;
        }

        .controls button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
            transition: background 0.25s, opacity 0.25s;
            color: white;
            font-weight: 600;
        }

        #btn-load    { background: #4caf50; }
        #btn-load:hover { background: #43a047; }
        #btn-refresh { background: #1976d2; }
        #btn-refresh:hover { background: #1565c0; }
        #btn-auto    { background: #ff7043; }
        #btn-auto.active { background: #e53935; }
        #btn-auto:hover  { opacity: 0.88; }

        .auto-label {
            color: white;
            font-size: 0.85em;
            opacity: 0.85;
        }

        /* ── Chart card ── */
        .chart-card {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chart-title {
            color: #e0e0e0;
            font-size: 1.1em;
            font-weight: 600;
        }

        .chart-price {
            color: #80cbc4;
            font-size: 1.3em;
            font-weight: 700;
        }

        #chart-container {
            width: 100%;
            height: 460px;
            border-radius: 6px;
            overflow: hidden;
        }

        /* ── Legend / tooltip overlay ── */
        #chart-legend {
            color: #b0bec5;
            font-size: 0.82em;
            margin-top: 8px;
            min-height: 20px;
        }

        /* ── Signal key ── */
        .signal-key {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .key-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #cfd8dc;
            font-size: 0.85em;
        }

        .key-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* ── Stats grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 18px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 14px;
            font-size: 1.1em;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .stat:last-child { border-bottom: none; }

        .stat-label { color: #777; font-size: 0.9em; }

        .stat-value {
            font-weight: 700;
            color: #333;
            font-size: 0.95em;
        }

        /* ── Recommendation ── */
        .recommendation {
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            margin: 12px 0 0;
        }

        .recommendation.buy,
        .recommendation.strong-buy  { background: #c8e6c9; color: #1b5e20; }
        .recommendation.sell,
        .recommendation.strong-sell { background: #ffcdd2; color: #b71c1c; }
        .recommendation.neutral     { background: #fff9c4; color: #e65100; }

        .rec-emoji  { font-size: 2em; }
        .rec-label  { font-size: 1.2em; font-weight: 700; margin: 4px 0; }
        .rec-conf   { font-size: 0.9em; opacity: 0.8; }

        /* ── Patterns list ── */
        .patterns-list {
            max-height: 340px;
            overflow-y: auto;
        }

        .pattern-item {
            background: #f8f8f8;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .pattern-item.buy  { border-left-color: #4caf50; }
        .pattern-item.sell { border-left-color: #f44336; }

        .pattern-name { font-weight: 600; color: #333; font-size: 0.9em; }

        .pattern-signal {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 8px;
            font-weight: 600;
        }

        .pattern-signal.buy     { background: #c8e6c9; color: #1b5e20; }
        .pattern-signal.sell    { background: #ffcdd2; color: #b71c1c; }
        .pattern-signal.neutral { background: #fff9c4; color: #e65100; }

        .pattern-conf { font-size: 0.8em; color: #999; margin-top: 3px; }

        /* ── Loading / error ── */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-banner {
            background: #ffcdd2;
            color: #b71c1c;
            padding: 14px 18px;
            border-radius: 8px;
            margin: 16px 0;
            font-weight: 500;
        }

        .last-update {
            color: rgba(255,255,255,0.65);
            font-size: 0.82em;
            text-align: right;
            margin-top: 8px;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            h1 { font-size: 1.6em; }
            #chart-container { height: 320px; }
            .controls { flex-direction: column; }
            .controls input,
            .controls select,
            .controls button { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1>📊 Crypto Candlestick Signal Bot</h1>
        <p>Real-time trading signals based on candlestick patterns</p>
    </header>

    <!-- Controls -->
    <div class="controls">
        <input type="text" id="symbol" placeholder="Symbol e.g. ETHUSDT" value="ETHUSDT">
        <select id="interval">
            <option value="1m">1m</option>
            <option value="5m">5m</option>
            <option value="15m" selected>15m</option>
            <option value="30m">30m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
        </select>
        <button id="btn-load"    onclick="loadAll()">Load Chart</button>
        <button id="btn-refresh" onclick="loadAll()">⟳ Refresh</button>
        <button id="btn-auto"    onclick="toggleAutoRefresh()">⏱ Auto-Refresh OFF</button>
        <span class="auto-label" id="auto-label"></span>
    </div>

    <!-- Chart -->
    <div class="chart-card">
        <div class="chart-header">
            <span class="chart-title" id="chart-title">Loading…</span>
            <span class="chart-price" id="chart-price"></span>
        </div>
        <div id="chart-container"></div>
        <div id="chart-legend">Hover over a candle to see OHLC values.</div>
        <div class="signal-key">
            <div class="key-item"><div class="key-dot" style="background:#26a69a;"></div> BUY signal</div>
            <div class="key-item"><div class="key-dot" style="background:#ef5350;"></div> SELL signal</div>
            <div class="key-item"><div class="key-dot" style="background:#9e9e9e;"></div> NEUTRAL signal</div>
        </div>
    </div>

    <!-- Dynamic stats / patterns panels -->
    <div id="content"></div>

    <div class="last-update" id="last-update"></div>

</div>

<script>
// ─── globals ───────────────────────────────────────────────────────────────
const API_BASE       = '/api';
let chart            = null;
let candleSeries     = null;
let autoRefreshTimer = null;
let autoActive       = false;
const AUTO_INTERVAL  = 30000;

// ─── chart init ────────────────────────────────────────────────────────────
function initChart() {
    const container = document.getElementById('chart-container');
    container.innerHTML = '';

    chart = LightweightCharts.createChart(container, {
        width:  container.clientWidth,
        height: container.clientHeight || 460,
        layout: {
            background: { type: 'solid', color: '#1e1e2e' },
            textColor:  '#d1d4dc',
        },
        grid: {
            vertLines:   { color: 'rgba(70, 70, 90, 0.5)' },
            horzLines:   { color: 'rgba(70, 70, 90, 0.5)' },
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.3)' },
        timeScale: {
            borderColor:        'rgba(197, 203, 206, 0.3)',
            timeVisible:        true,
            secondsVisible:     false,
        },
    });

    candleSeries = chart.addCandlestickSeries({
        upColor:          '#26a69a',
        downColor:        '#ef5350',
        borderUpColor:    '#26a69a',
        borderDownColor:  '#ef5350',
        wickUpColor:      '#26a69a',
        wickDownColor:    '#ef5350',
    });

    // OHLC tooltip on crosshair move
    chart.subscribeCrosshairMove(param => {
        const legend = document.getElementById('chart-legend');
        if (!param || !param.time || !param.seriesData) {
            legend.textContent = 'Hover over a candle to see OHLC values.';
            return;
        }
        const d = param.seriesData.get(candleSeries);
        if (!d) return;
        const dt = new Date(param.time * 1000).toLocaleString('en-US', { dateStyle: 'short', timeStyle: 'medium' });
        legend.innerHTML =
            `<strong>${dt}</strong>&nbsp;&nbsp;` +
            `O <strong>${d.open.toFixed(4)}</strong>&nbsp;` +
            `H <strong style="color:#26a69a">${d.high.toFixed(4)}</strong>&nbsp;` +
            `L <strong style="color:#ef5350">${d.low.toFixed(4)}</strong>&nbsp;` +
            `C <strong>${d.close.toFixed(4)}</strong>`;
    });

    // Responsive resize
    window.addEventListener('resize', () => {
        if (chart) chart.applyOptions({ width: container.clientWidth });
    });
}

// ─── data loading ──────────────────────────────────────────────────────────
async function loadAll() {
    const symbol   = document.getElementById('symbol').value.trim().toUpperCase();
    const interval = document.getElementById('interval').value;

    // Validate symbol: must be non-empty alphanumeric string
    if (!symbol || !/^[A-Z0-9]{2,20}$/.test(symbol)) {
        showError('Please enter a valid trading symbol (e.g. ETHUSDT).');
        return;
    }

    // Show spinner in content area while fetching
    document.getElementById('content').innerHTML =
        '<div class="loading"><div class="spinner"></div>Loading data…</div>';
    document.getElementById('chart-title').textContent = `${symbol} · ${interval}`;
    document.getElementById('chart-price').textContent = '';

    try {
        const [candleResp, signalResp] = await Promise.all([
            fetch(`${API_BASE}/candles?symbol=${symbol}&interval=${interval}`),
            fetch(`${API_BASE}/signals?symbol=${symbol}&interval=${interval}`)
        ]);

        const candleData = await candleResp.json();
        const signalData = await signalResp.json();

        if (!candleData.success) {
            showError(candleData.error || 'Failed to load candle data.');
            return;
        }

        renderChart(candleData);

        if (signalData.success) {
            renderStats(signalData);
        } else {
            document.getElementById('content').innerHTML =
                `<div class="error-banner">Signal error: ${signalData.error}</div>`;
        }

        document.getElementById('last-update').textContent =
            'Last updated: ' + new Date().toLocaleString('en-US', { dateStyle: 'short', timeStyle: 'medium' });

    } catch (err) {
        showError(err.message);
    }
}

function renderChart(data) {
    if (!chart) initChart();

    // Set candle data
    candleSeries.setData(data.candles);

    // Set signal markers (sorted by time – already sorted by backend)
    candleSeries.setMarkers(data.markers || []);

    // Fit all data in view
    chart.timeScale().fitContent();

    // Update current price from last candle
    if (data.candles.length > 0) {
        const last = data.candles[data.candles.length - 1];
        document.getElementById('chart-price').textContent =
            '$' + last.close.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    }
}

function renderStats(data) {
    const recRaw   = data.recommendation || 'NEUTRAL';
    const recClass = recRaw.toLowerCase().replace(/\s+/g, '-');

    const recEmoji =
        recRaw === 'STRONG BUY'  ? '🟢' :
        recRaw === 'BUY'         ? '📈' :
        recRaw === 'STRONG SELL' ? '🔴' :
        recRaw === 'SELL'        ? '📉' : '⚪';

    let html = `
        <div class="grid">
            <div class="card">
                <h2>📌 Market Info</h2>
                <div class="stat">
                    <span class="stat-label">Symbol</span>
                    <span class="stat-value">${data.symbol}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Timeframe</span>
                    <span class="stat-value">${data.interval}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Current Price</span>
                    <span class="stat-value">$${Number(data.current_price).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:4})}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Last Candle</span>
                    <span class="stat-value">${new Date(data.last_candle.time).toLocaleString('en-US', { dateStyle: 'short', timeStyle: 'medium' })}</span>
                </div>
            </div>

            <div class="card">
                <h2>🕯 Last Candle (OHLC)</h2>
                <div class="stat">
                    <span class="stat-label">Open</span>
                    <span class="stat-value">${Number(data.last_candle.open).toFixed(4)}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">High</span>
                    <span class="stat-value" style="color:#26a69a">${Number(data.last_candle.high).toFixed(4)}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Low</span>
                    <span class="stat-value" style="color:#ef5350">${Number(data.last_candle.low).toFixed(4)}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Close</span>
                    <span class="stat-value">${Number(data.last_candle.close).toFixed(4)}</span>
                </div>
            </div>

            <div class="card">
                <h2>📊 Signal Summary</h2>
                <div class="stat">
                    <span class="stat-label">Patterns Detected</span>
                    <span class="stat-value">${data.signals_detected}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Buy Signals</span>
                    <span class="stat-value" style="color:#1b5e20">🟢 ${data.buy_signals}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Sell Signals</span>
                    <span class="stat-value" style="color:#b71c1c">🔴 ${data.sell_signals}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Neutral Signals</span>
                    <span class="stat-value" style="color:#666">⚪ ${data.neutral_signals}</span>
                </div>
                <div class="recommendation ${recClass}">
                    <div class="rec-emoji">${recEmoji}</div>
                    <div class="rec-label">${recRaw}</div>
                    <div class="rec-conf">Confidence: ${data.recommendation_confidence}%</div>
                </div>
            </div>
        </div>
    `;

    if (data.patterns && data.patterns.length > 0) {
        html += `
            <div class="card">
                <h2>🔍 Detected Patterns</h2>
                <div class="patterns-list">
        `;
        data.patterns.forEach(p => {
            const cls = p.signal.toLowerCase();
            html += `
                <div class="pattern-item ${cls}">
                    <div class="pattern-name">
                        ${p.pattern.replace(/_/g, ' ').toUpperCase()}
                        <span class="pattern-signal ${cls}">${p.signal}</span>
                    </div>
                    <div class="pattern-conf">Confidence: ${p.confidence}% &nbsp;|&nbsp; Candle index: ${p.index}</div>
                </div>
            `;
        });
        html += '</div></div>';
    } else {
        html += `<div class="card"><h2>🔍 Detected Patterns</h2><p style="color:#999;font-size:.9em;">No patterns above confidence threshold detected.</p></div>`;
    }

    document.getElementById('content').innerHTML = html;
}

function showError(msg) {
    document.getElementById('content').innerHTML =
        `<div class="error-banner">⚠️ ${msg}</div>`;
}

// ─── auto-refresh ──────────────────────────────────────────────────────────
function toggleAutoRefresh() {
    const btn   = document.getElementById('btn-auto');
    const label = document.getElementById('auto-label');

    if (autoActive) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
        autoActive       = false;
        btn.textContent  = '⏱ Auto-Refresh OFF';
        btn.classList.remove('active');
        label.textContent = '';
    } else {
        autoActive      = true;
        btn.textContent = '⏱ Auto-Refresh ON';
        btn.classList.add('active');
        label.textContent = '(refreshes every 30s)';
        loadAll();
        autoRefreshTimer = setInterval(loadAll, AUTO_INTERVAL);
    }
}

// ─── bootstrap ─────────────────────────────────────────────────────────────
initChart();
window.addEventListener('load', loadAll);
</script>
</body>
</html>
