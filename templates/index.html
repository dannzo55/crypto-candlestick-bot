<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Candlestick Signal Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input,
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
        }

        input {
            background: white;
            color: #333;
            width: 200px;
        }

        button {
            background: #ff6b6b;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #ff5252;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        .recommendation {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
        }

        .recommendation.buy {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .recommendation.sell {
            background: #ffcdd2;
            color: #c62828;
        }

        .recommendation.neutral {
            background: #fff9c4;
            color: #f57f17;
        }

        .recommendation.strong {
            font-size: 1.3em;
            font-weight: bold;
        }

        .patterns-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .pattern-item {
            background: #f5f5f5;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .pattern-name {
            font-weight: bold;
            color: #333;
        }

        .pattern-signal {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            margin-left: 10px;
            font-size: 0.9em;
        }

        .pattern-signal.buy {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .pattern-signal.sell {
            background: #ffcdd2;
            color: #c62828;
        }

        .pattern-signal.neutral {
            background: #fff9c4;
            color: #f57f17;
        }

        .confidence {
            font-size: 0.85em;
            color: #999;
            margin-top: 3px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #ffcdd2;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .last-update {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>📊 Crypto Candlestick Signal Bot</h1>
            <p>Real-time trading signals based on candlestick patterns</p>
        </header>

        <div class="controls">
            <input type="text" id="symbol" placeholder="Trading Pair (e.g., ETHUSDT)" value="ETHUSDT">
            <input type="text" id="interval" placeholder="Timeframe (e.g., 15m)" value="15m">
            <button onclick="loadSignals()">Load Signals</button>
            <button onclick="startAutoRefresh()">Auto Refresh (30s)</button>
        </div>

        <!-- TradingView Chart -->
        <div id="tradingview-chart" style="height: 600px; width: 100%; margin-bottom: 30px;"></div>

        <div id="content"></div>
    </div>

    <script>
        const API_BASE = '/api';
        let autoRefreshInterval = null;

        async function loadSignals() {
            const symbol = document.getElementById('symbol').value;
            const interval = document.getElementById('interval').value;
            const content = document.getElementById('content');

            content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading signals...</div>';

            try {
                const response = await fetch(`${API_BASE}/signals?symbol=${symbol}&interval=${interval}`);
                const data = await response.json();

                if (data.success) {
                    displaySignals(data);
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function displaySignals(data) {
            const content = document.getElementById('content');
            const recClass = data.recommendation.toLowerCase().replace(' ', '-');
            const isStrong = data.recommendation.includes('STRONG');

            let html = `
                <div class="grid">
                    <div class="card">
                        <h2>Current Status</h2>
                        <div class="stat">
                            <span class="stat-label">Symbol:</span>
                            <span class="stat-value">${data.symbol}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Timeframe:</span>
                            <span class="stat-value">${data.interval}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Current Price:</span>
                            <span class="stat-value">$${data.current_price.toFixed(2)}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Last Candle Time:</span>
                            <span class="stat-value">${new Date(data.last_candle.time).toLocaleTimeString()}</span>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h2>Candle Data</h2>
                        <div class="stat">
                            <span class="stat-label">Open:</span>
                            <span class="stat-value">${parseFloat(data.last_candle.open).toFixed(4)}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">High:</span>
                            <span class="stat-value">${parseFloat(data.last_candle.high).toFixed(4)}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Low:</span>
                            <span class="stat-value">${parseFloat(data.last_candle.low).toFixed(4)}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Close:</span>
                            <span class="stat-value">${parseFloat(data.last_candle.close).toFixed(4)}</span>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h2>Signal Summary</h2>
                        <div class="stat">
                            <span class="stat-label">Total Patterns:</span>
                            <span class="stat-value">${data.signals_detected}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Buy Signals:</span>
                            <span class="stat-value" style="color: #2e7d32;">${data.buy_signals}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Sell Signals:</span>
                            <span class="stat-value" style="color: #c62828;">${data.sell_signals}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Neutral:</span>
                            <span class="stat-value">${data.neutral_signals}</span>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="recommendation ${recClass} ${isStrong ? 'strong' : ''}">
                        <div style="font-size: 2em;">
                            ${data.recommendation === 'STRONG BUY' ? '🟢' :
                    data.recommendation === 'BUY' ? '📈' :
                        data.recommendation === 'STRONG SELL' ? '🔴' :
                            data.recommendation === 'SELL' ? '📉' : '⚪'}
                        </div>
                        <div>${data.recommendation}</div>
                        <div>Confidence: ${data.recommendation_confidence}%</div>
                    </div>
                </div>
            `;

            if (data.patterns.length > 0) {
                html += `
                    <div class="card">
                        <h2>Detected Patterns</h2>
                        <div class="patterns-list">
                `;

                data.patterns.forEach(pattern => {
                    const signalClass = pattern.signal.toLowerCase();
                    html += `
                        <div class="pattern-item">
                            <div class="pattern-name">
                                ${pattern.pattern.replace(/_/g, ' ').toUpperCase()}
                                <span class="pattern-signal ${signalClass}">${pattern.signal}</span>
                            </div>
                            <div class="confidence">Confidence: ${pattern.confidence}%</div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            html += `<div class="last-update">Last updated: ${new Date(data.timestamp).toLocaleString()}</div>`;

            content.innerHTML = html;
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                alert('Auto refresh stopped');
            } else {
                loadSignals();
                autoRefreshInterval = setInterval(loadSignals, 30000);
                alert('Auto refresh started (every 30 seconds)');
            }
        }

        // Load signals on page load
        window.addEventListener('load', loadSignals);
    </script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "container_id": "tradingview-chart",
            "width": "100%",
            "height": 600,
            "symbol": "BINANCE:ETHUSDT",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "light",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true
        });
    </script>
</body>

</html>
